services:
  backend:
    build:
      context: ./backend/azumchefe-lexicon-service/azumchefe-lexicon-service
      dockerfile: Dockerfile
    container_name: azumchefe-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Azumchefe__LexiconPath=/srv/azumchefe/public/
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/azumchefe_lexicon
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=/api
    container_name: azumchefe-frontend
    environment:
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: azumchefe-caddy
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  caddy_data:
